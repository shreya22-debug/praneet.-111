<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Praneet</title>

<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Times New Roman", serif;
  text-align: center;
  color: white;
  overflow: hidden;
  background: #ffd1dc; /* pastel pink */
}

h1 {
  margin-top: 30px;
  font-size: 2rem;
}

/* Cake */
.cake {
  margin: 30px auto;
  width: 150px;
  animation: breathe 3s infinite ease-in-out;
}

@keyframes breathe {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

.layer {
  width: 100%;
  height: 40px;
  background: linear-gradient(45deg, #ffd54f, #ffeb3b);
  border-radius: 10px;
  margin-top: 5px;
  border: 2px solid white;
}

.candle {
  width: 8px;
  height: 25px;
  background: white;
  margin: auto;
  position: relative;
}

.flame {
  width: 8px;
  height: 8px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -8px;
  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

/* Message */
.message {
  margin: 40px auto;
  width: 70%;
  max-width: 300px;
  background: rgba(255,255,255,0.18);
  padding: 15px;
  border-radius: 15px;
  backdrop-filter: blur(5px);
  font-family: 'Shadows Into Light', cursive;
  font-size: 1.6rem;
  animation: fadeInUp 2s ease forwards;
}

.sub {
  margin-top: 10px;
  font-size: 1.2rem;
  font-family: "Times New Roman", serif;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); }
  100% { transform: translateY(110vh) rotate(720deg); }
}

/* Balloons */
.balloon {
  width: 40px;
  height: 50px;
  border-radius: 50%;
  position: fixed;
  animation: float linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-120vh); }
}

/* Emoji */
.emoji {
  position: fixed;
  font-size: 24px;
  pointer-events: none;
}

/* 🎀 STICKERS */
.sticker {
  position: fixed;
  width: 70px;
  height: auto;
  pointer-events: none;
  animation: floatSticker 6s infinite ease-in-out;
}

@keyframes floatSticker {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-18px) rotate(8deg); }
  100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Praneet 🎂</h1>

<!-- 🎀 STICKERS -->
<img src="lala.png" class="sticker" style="top:8%; left:5%;">
<img src="cute.png" class="sticker" style="top:18%; right:8%;">
<img src="evil.png" class="sticker" style="bottom:20%; left:10%;">
<img src="letter.png" class="sticker" style="bottom:10%; right:12%;">
<img src="web.png" class="sticker" style="top:40%; left:85%;">
<img src="spidey.png" class="sticker" style="top:60%; left:5%;">
<img src="spideycake.png" class="sticker" style="bottom:35%; right:40%;">

<!-- Cake -->
<div class="cake">
  <div class="candle"><div class="flame"></div></div>
  <div class="layer"></div>
  <div class="layer"></div>
  <div class="layer"></div>
</div>

<!-- Message -->
<div class="message">
  <p>i still care about you ❤️</p>
  <div class="sub">happy 18th</div>
</div>

<script>

// Confetti
for (let i = 0; i < 120; i++) {
  let c = document.createElement("div");
  c.className = "confetti";
  c.style.left = Math.random() * 100 + "vw";
  c.style.background = `hsl(${Math.random()*360}, 90%, 60%)`;
  c.style.animationDuration = (2 + Math.random()*3) + "s";
  document.body.appendChild(c);
}

// Balloons
for (let i = 0; i < 20; i++) {
  let b = document.createElement("div");
  b.className = "balloon";
  b.style.left = Math.random() * 100 + "vw";
  b.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
  b.style.animationDuration = (4 + Math.random()*4) + "s";
  document.body.appendChild(b);
}

// Emoji burst
let emojis = ["❤️","✨","💗","🌟","🥳","🎉","💫"];

function burst() {
  for (let i = 0; i < 30; i++) {
    let e = document.createElement("div");
    e.className = "emoji";
    e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

    let x = window.innerWidth / 2;
    let y = window.innerHeight / 2;

    e.style.left = x + "px";
    e.style.top = y + "px";

    document.body.appendChild(e);

    let angle = Math.random() * 2 * Math.PI;
    let distance = 150 + Math.random() * 200;

    let dx = Math.cos(angle) * distance;
    let dy = Math.sin(angle) * distance;

    e.animate([
      { transform: "translate(0,0)", opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 }
    ], {
      duration: 1500,
      easing: "ease-out"
    });

    setTimeout(() => e.remove(), 1500);
  }
}

window.onload = burst;

</script>

</body>
</html>
